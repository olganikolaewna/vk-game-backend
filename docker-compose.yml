version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sudoku_postgres
    environment:
      POSTGRES_DB: sudoku_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sudoku_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sudoku_network

  fastapi_app:
    build: .
    container_name: sudoku_api
    environment:
      DATABASE_URL: postgresql://postgres:sudoku_password_123@postgres:5432/sudoku_db
      AI_SERVICE_URL: http://91.227.68.140:8000
      DEBUG: "True"
      PORT: 7860
    ports:
      - "7860:7860"  # ← Меняем порт на 7860
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - sudoku_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  sudoku_network:
    driver: bridge